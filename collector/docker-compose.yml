# One-command local observability stack for Bitburner telemetry:
#
#   docker compose up -d
#
#   OTLP receiver (point your scripts here) ... http://localhost:4318   (CORS-open)
#   Grafana (dashboards, no login needed) ..... http://localhost:3000
#   Prometheus (raw metrics) .................. http://localhost:9090
#
# Flow: game --OTLP/HTTP--> otel-collector --> Loki (logs), Prometheus (metrics),
# Tempo (traces) --> Grafana (pre-provisioned datasources + Bitburner dashboard).
services:
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.115.1
    command: ["--config=/etc/otelcol/config.yaml"]
    volumes:
      - ./otel-collector-config.yaml:/etc/otelcol/config.yaml:ro
    ports:
      - "4318:4318" # OTLP/HTTP receiver — the game POSTs here
      - "8889:8889" # Prometheus scrape endpoint (internal plumbing, handy for debugging)
    depends_on: # ordering only; the collector's exporters retry until Loki/Tempo are up
      - loki
      - tempo

  loki:
    image: grafana/loki:3.3.2
    command: ["-config.file=/etc/loki/local-config.yaml"]
    ports:
      - "3100:3100"
    volumes:
      - loki-data:/loki

  tempo:
    image: grafana/tempo:2.6.1
    command: ["-config.file=/etc/tempo.yaml"]
    volumes:
      - ./tempo.yaml:/etc/tempo.yaml:ro
      - tempo-data:/var/tempo
    ports:
      - "3200:3200"

  prometheus:
    image: prom/prometheus:v3.1.0
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:11.4.0
    environment:
      # No login for a local stack — open http://localhost:3000 and you're in.
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_DISABLE_LOGIN_FORM=true
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
      - loki
      - tempo

volumes:
  loki-data:
  tempo-data:
  prometheus-data:
